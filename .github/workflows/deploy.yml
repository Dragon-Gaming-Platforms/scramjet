name: Deploy Scramjet

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  WASM_BINDGEN_VERSION: "0.2.105"

jobs:
  build-scramjet:
    name: Build Scramjet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install pnpm dependencies
        run: pnpm install

      - name: Setup Rewriter Toolchain
        uses: ./.github/actions/setup-rewriter-toolchain
        with:
          wasm-bindgen-version: ${{ env.WASM_BINDGEN_VERSION }}
          rewriter-path: packages/core/rewriter
          github-token: ${{ github.token }}

      - name: Setup Rust nightly for WASM
        run: |
          rustup toolchain install nightly
          rustup component add rust-src --toolchain nightly-x86_64-unknown-linux-gnu
          rustup target add wasm32-unknown-unknown --toolchain nightly-x86_64-unknown-linux-gnu

      - name: Build Rewriter WASM
        run: RELEASE=1 pnpm run rewriter:build

      - name: Build all packages
        run: pnpm run build

      - name: Setup staticbuild for deployment
        shell: bash
        run: |
          set -euo pipefail
          
          echo "=== Setting up staticbuild directory ==="
          
          # Ensure directories exist
          mkdir -p staticbuild/scram staticbuild/baremux
          
          # Copy scramjet distribution files
          if [ -f "packages/core/dist/scramjet.js" ]; then
            echo "✓ Copying scramjet.js"
            cp packages/core/dist/scramjet.js staticbuild/scram/scramjet.all.js
          else
            echo "✗ scramjet.js not found at packages/core/dist/scramjet.js"
            find packages/core/dist -name "*.js" -type f | head -10
            exit 1
          fi
          
          # Generate config.js with default configuration
          echo "✓ Generating config.js"
          cat > staticbuild/config.js << 'JSEOF'
          let _CONFIG = {
            wispurl: (location.protocol === "https:" ? "wss" : "ws") + "://" + location.host + "/wisp/",
            bareurl: (location.protocol === "https:" ? "https" : "http") + "://" + location.host + "/bare/"
          };
          JSEOF
          
          # Verify all required files exist
          echo "=== Verifying staticbuild contents ==="
          for file in staticbuild/index.html staticbuild/config.js staticbuild/scram/scramjet.all.js staticbuild/store.js staticbuild/ui.js; do
            if [ -f "$file" ]; then
              echo "✓ $file"
            else
              echo "✗ $file missing"
              exit 1
            fi
          done
          
          echo "=== Final staticbuild structure ==="
          find staticbuild -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: staticbuild

  deploy:
    name: Deploy to GitHub Pages
    needs: build-scramjet
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
